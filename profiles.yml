# Copy to ~/.dbt/profiles.yml (or set DBT_PROFILES_DIR to this folder).
creative_intelligence:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "target/dev.duckdb"     # ephemeral local catalog (ADR-005: catalog is compute-only)
      extensions: [httpfs, parquet, json]   # json: stg_gemini_raw.sql unnests the verbatim Bronze envelope
      # S3 read/write for Bronze/Silver/Gold (ADR-005, no MinIO). Credentials resolve via the
      # default AWS credential chain (env vars / ~/.aws / instance role) — same chain the
      # `CREATE SECRET (TYPE S3, PROVIDER CREDENTIAL_CHAIN, ...)` pattern in scripts/*.py uses.
      # Region MUST match the bucket's real region (AWS_REGION in .env) or httpfs reads 403/404.
      settings:
        s3_region: "{{ env_var('AWS_REGION', 'ap-southeast-1') }}"
