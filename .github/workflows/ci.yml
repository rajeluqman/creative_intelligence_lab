name: CI

# static-gates: $0, no cloud, no secrets, runs on every PR + push (mirrors the pharma gym CI
# pattern). Proves: scripts compile, lint clean, dbt graph parses, seeds load, GE JSON valid.
# real-build: push-to-main only, real dbt build against real S3 via OIDC role federation — no
# static AWS keys, never runs on pull_request (ADR-013).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ADR-coupling gate needs the base ref reachable for git diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff dbt-duckdb pandas

      - name: Lint (ruff)
        run: ruff check scripts/ tests/ .claude/hooks/

      - name: Compile Python
        run: |
          shopt -s nullglob
          for f in scripts/*.py tests/*.py .claude/hooks/*.py; do python -m py_compile "$f"; done

      - name: dbt deps + parse (graph integrity)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
          # CLIENT_ID has NO default in _sources.yml (fail-loud multi-client guard) — parse
          # renders env_var('CLIENT_ID') so CI must set it. Any valid seeded slug works.
          CLIENT_ID: voltecx
          # S3_BUCKET also has no default (same fail-loud pattern) — _sources.yml's
          # external_location Jinja renders at PARSE time, before any model actually runs,
          # so even `dbt parse`/`dbt seed` need a value even though no real S3 call happens.
          # Placeholder is safe: no read/write is issued at parse/seed time.
          S3_BUCKET: ci-placeholder-bucket
        run: |
          cp profiles.yml.example profiles.yml
          dbt deps
          dbt parse

      - name: dbt seed (seeds load + types)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
          CLIENT_ID: voltecx
          S3_BUCKET: ci-placeholder-bucket
        run: dbt seed

      - name: Golden dataset test (fact_chunk VALUE correctness, not just shape)
        run: python tests/golden/run_golden_test.py

      - name: Lineage contract (ADR-006 — manifest fidelity)
        run: python tests/lineage_contract.py

      - name: Boundary contract (ADR-001/004/005 + v1 scope)
        run: python tests/boundary_contract.py

      - name: Doc-reference contract (no model/path drift in architecture docs)
        run: python tests/doc_reference_contract.py

      - name: Doc-reference contract self-test (the gate is itself tested)
        run: python tests/test_doc_reference_contract.py

      - name: Repo-map freshness (navigation index matches ground truth)
        run: python scripts/gen_repo_map.py --check

      - name: ADR-coupling contract (structural governed change ⇒ ADR in same diff)
        run: python tests/adr_coupling_contract.py origin/main

      - name: ADR-coupling self-test (the gate is itself tested)
        run: python tests/test_adr_coupling_contract.py

      - name: Validate Great Expectations JSON (if any)
        run: |
          shopt -s nullglob globstar
          for f in great_expectations/**/*.json; do
            python -c "import json,sys; json.load(open('$f'))" && echo "ok: $f"
          done

      - name: Guard — no secrets / .env committed
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::.env must not be committed"; exit 1
          fi
          echo "no .env tracked - ok"

  # Real dbt build against real S3 — push-to-main only, never pull_request (ADR-013): the role's
  # trust policy is itself branch-restricted to main, and gating here too is a second, independent
  # control so unreviewed PR code can never get real S3 write access even if one control slips.
  real-build:
    name: Real dbt build (S3, OIDC role)
    needs: static-gates
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install dbt-duckdb

      - name: Configure AWS credentials (OIDC role assumption — no static keys, ADR-013)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::579880301047:role/creative-intel-ci-role
          aws-region: ap-southeast-1

      - name: dbt build (real S3 — role is read-only on Bronze, read+write Silver/Gold only)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}
          S3_BUCKET: creative-intel-lake
          CLIENT_ID: voltecx
        run: |
          dbt deps
          dbt build -s +marts.core
